name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run tests
        run: ./mvnw -B verify

  docker:
    name: Publish Docker image
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Redeploy asta (ASTASRV01)
    needs: docker
    # Only on a real push to main — never on tags or PRs (the self-hosted runner
    # has the host docker socket, so it must not run untrusted/fork code).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, astasrv01]
    steps:
      - name: Surgical redeploy of hinata-server
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pull the freshly-built image and recreate ONLY the server container
          # (--no-deps keeps mongo1/mongo2/mongo-arbiter/minio online). Compose
          # runs in a docker:cli sidecar against the host socket; the stack lives
          # at /opt/stacks/hinata on ASTASRV01 and has all values inline (no .env).
          docker run --rm \
            -e GHCR_USER -e GHCR_TOKEN \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /opt/stacks/hinata:/work -w /work \
            docker:cli sh -euc '
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
              docker compose -p hinata pull hinata-server
              docker compose -p hinata up -d --no-deps --force-recreate hinata-server
              docker logout ghcr.io'
