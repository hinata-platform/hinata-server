name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      # Validates the checked-in gradle-wrapper.jar against known-good checksums
      # and provides dependency/build caching.
      - uses: gradle/actions/setup-gradle@v4
      - name: Build & test
        run: ./gradlew build

  docker:
    name: Publish Docker image
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Redeploy asta + bear (ASTASRV01)
    needs: docker
    # Only on a real push to main — never on tags or PRs (the self-hosted runner
    # has the host docker socket, so it must not run untrusted/fork code).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, astasrv01]
    steps:
      - name: Surgical redeploy of hinata-server (asta + bear)
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Both instances run the SAME ghcr server image (:latest) — the backend
          # URL is runtime env, not baked — so each stack just pulls + recreates
          # ONLY its server container (--no-deps keeps mongo1/mongo2/mongo-arbiter/
          # minio online). Compose runs in a docker:cli sidecar against the host
          # socket. Stack dirs on ASTASRV01:
          #   asta -> /opt/stacks/hinata       (project "hinata",      inline values)
          #   bear -> /opt/stacks/hinata-bear  (project "hinata-bear", loads its .env)
          for STACK in hinata hinata-bear; do
            echo "::group::redeploy $STACK (server)"
            docker run --rm \
              -e GHCR_USER -e GHCR_TOKEN -e STACK="$STACK" \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "/opt/stacks/$STACK:/work" -w /work \
              docker:cli sh -euc '
                echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
                docker compose -p "$STACK" pull hinata-server
                docker compose -p "$STACK" up -d --no-deps --force-recreate hinata-server
                docker logout ghcr.io'
            echo "::endgroup::"
          done
