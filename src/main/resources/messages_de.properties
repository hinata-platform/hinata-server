error.auth.accountDeactivated=Konto ist deaktiviert
error.auth.invalidRefreshToken=Ungültiges Refresh-Token
error.auth.notRefreshToken=Kein Refresh-Token
error.auth.tooManyAttempts=Zu viele fehlgeschlagene Versuche. Bitte später erneut versuchen.

# SSO
error.sso.unknownProvider=Unbekannter SSO-Anbieter
error.sso.invalidReturnOrigin=Ungültige Rücksprungadresse
