# German error messages. Resolved when Accept-Language requests "de".
# Keep keys in sync with messages.properties. Encoding: UTF-8 (spring.messages.encoding).

# Generic
error.notFound={0} nicht gefunden
error.validationFailed=Validierung fehlgeschlagen
error.malformedBody=Fehlerhafter oder nicht lesbarer Anfragetext
error.uploadTooLarge=Upload überschreitet die zulässige Größe
error.accessDenied=Zugriff verweigert
error.internal=Interner Serverfehler

# Entitätsnamen (werden in error.notFound eingesetzt)
entity.board=Board
entity.notification=Benachrichtigung
entity.user=Benutzer
entity.project=Projekt
entity.issue=Vorgang
entity.workItem=Arbeitseintrag
entity.attachment=Anhang
entity.article=Artikel

# Auth
error.auth.required=Anmeldung erforderlich
error.auth.unknownUser=Unbekannter Benutzer
