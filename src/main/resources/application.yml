spring:
  application:
    name: hinata-server
  # All timestamps are serialized as ISO-8601 UTC (trailing 'Z'); clients localize
  # for display. Pinning the zone (rather than relying on the JVM default) keeps
  # the API contract stable regardless of host/container timezone. Jackson 3
  # already defaults WRITE_DATES_AS_TIMESTAMPS to false, so java.time types
  # serialize as ISO-8601 strings without any extra configuration.
  jackson:
    time-zone: UTC
  # Localized error messages (messages.properties / messages_de.properties).
  # fallback-to-system-locale=false so unsupported languages use the English
  # default bundle rather than the server's OS locale.
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false
  # Use the dev profile unless one is explicitly selected (SPRING_PROFILES_ACTIVE).
  profiles:
    default: dev
  # Spring Boot 4: connection settings live under spring.mongodb (not spring.data.mongodb)
  mongodb:
    uri: ${HINATA_MONGODB_URI:mongodb://localhost:27017/hinata}
    database: ${HINATA_MONGODB_NAME:hinata}
  data:
    mongodb:
      auto-index-creation: true
  mail:
    host: ${HINATA_SMTP_HOST:localhost}
    port: ${HINATA_SMTP_PORT:1025}
    username: ${HINATA_SMTP_USERNAME:}
    password: ${HINATA_SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: ${HINATA_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${HINATA_SMTP_STARTTLS:false}
  servlet:
    multipart:
      # Per-file and per-request hard limits. The per-request ceiling allows
      # several files in one multipart request; the app still enforces the
      # file count + aggregate size (HINATA_STORAGE_MAX_FILES_PER_REQUEST /
      # _MAX_REQUEST_MB) on top of these.
      max-file-size: ${HINATA_STORAGE_MAX_UPLOAD_MB:25}MB
      max-request-size: ${HINATA_STORAGE_MAX_REQUEST_MB:100}MB
  # MCP (Model Context Protocol) server. Spring AI auto-configures a synchronous
  # WebMVC Streamable-HTTP endpoint at /mcp; @McpTool/@McpResource/@McpPrompt beans
  # are discovered by the annotation scanner. The endpoint is a normal filtered
  # servlet request and is secured by the dedicated /mcp SecurityFilterChain
  # (PAT or app-JWT bearer). SYNC keeps tool invocations on the request thread so
  # the SecurityContext (and thus CurrentUser) is available inside the tools.
  # HINATA_MCP_ENABLED is the single master switch shared with hinata.mcp.enabled.
  ai:
    mcp:
      server:
        enabled: ${HINATA_MCP_ENABLED:true}
        name: ${HINATA_MCP_SERVER_NAME:hinata}
        version: '@project.version@'
        protocol: STREAMABLE
        type: SYNC
        annotation-scanner:
          enabled: true

server:
  port: ${HINATA_PORT:8080}
  forward-headers-strategy: framework
  tomcat:
    # Keep-alive tuning so the SERVER never closes a pooled socket out from under
    # a client mid-burst. A single view fires ~12–15 GETs and every comment
    # pin/react leaves more keep-alive sockets idling; with Tomcat's defaults
    # (max-keep-alive-requests=100, keep-alive-timeout≈20s) the server would close
    # them, and the client's next reuse of a now-dead socket throws "connection
    # closed before full header was received" → a spurious app-wide error. Let the
    # CLIENT (which drops idle sockets after 5s) decide when to retire a
    # connection; never close on request count, and hold idle sockets generously.
    max-keep-alive-requests: -1
    keep-alive-timeout: 120000
  error:
    include-stacktrace: never
    include-message: never
  servlet:
    session:
      cookie:
        # Any session cookie issued by the SSO redirect flows is locked down
        # (OWASP A05). 'secure' is enabled in the prod profile (HTTPS only).
        http-only: true
        same-site: strict

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
  health:
    ldap:
      # LDAP is configured at runtime via ServerSettings; the static indicator
      # would probe localhost:389 and pollute the health endpoint and logs.
      enabled: false

hinata:
  version: '@project.version@'
  base-url: ${HINATA_BASE_URL:http://localhost:8080}
  # Frontend (Flutter web) base URL for email deep links, e.g. http://localhost:3000.
  # Blank ⇒ falls back to base-url.
  web-base-url: ${HINATA_WEB_BASE_URL:}
  jwt:
    secret: ${HINATA_JWT_SECRET:change-me-change-me-change-me-change-me-change-me-change-me-1234}
    access-token-seconds: ${HINATA_JWT_ACCESS_SECONDS:900}
    refresh-token-seconds: ${HINATA_JWT_REFRESH_SECONDS:1209600}
  rate-limit:
    enabled: ${HINATA_RATE_LIMIT_ENABLED:true}
    api-per-minute: ${HINATA_RATE_LIMIT_API:300}
    auth-per-minute: ${HINATA_RATE_LIMIT_AUTH:10}
    mcp-per-minute: ${HINATA_RATE_LIMIT_MCP:120}
    max-login-failures: ${HINATA_MAX_LOGIN_FAILURES:5}
    login-block-minutes: ${HINATA_LOGIN_BLOCK_MINUTES:15}
  mcp:
    # Master switch for the MCP feature (also gates the /mcp transport above and
    # the `mcp` app feature flag). Personal Access Tokens are the Phase-1 auth.
    enabled: ${HINATA_MCP_ENABLED:true}
    server-name: ${HINATA_MCP_SERVER_NAME:hinata}
    # Max active Personal Access Tokens a single user may hold.
    max-pats-per-user: ${HINATA_MCP_MAX_PATS:20}
    # Default lifetime (days) applied when a PAT is created without an explicit
    # expiry. 0 ⇒ never expires.
    default-token-ttl-days: ${HINATA_MCP_TOKEN_TTL_DAYS:90}
    # Phase-2 OAuth 2.1 authorization server for the Claude/Desktop one-click
    # Connect button. Requires base-url to be the public HTTPS URL.
    oauth-enabled: ${HINATA_MCP_OAUTH_ENABLED:true}
    dynamic-client-registration: ${HINATA_MCP_OAUTH_DCR:true}
    access-token-ttl-seconds: ${HINATA_MCP_OAUTH_ACCESS_TTL_SECONDS:3600}
    auth-code-ttl-seconds: ${HINATA_MCP_OAUTH_AUTH_CODE_TTL_SECONDS:120}
    refresh-token-ttl-days: ${HINATA_MCP_OAUTH_REFRESH_TTL_DAYS:30}
  cors:
    allowed-origins: ${HINATA_CORS_ALLOWED_ORIGINS:}
  security:
    # CIDRs of reverse proxies allowed to set X-Forwarded-For. Empty = ignore
    # the header and use the socket address (spoofing-resistant, OWASP A07).
    trusted-proxies: ${HINATA_TRUSTED_PROXIES:}
  mongodb:
    tls:
      enabled: ${HINATA_MONGO_TLS_ENABLED:false}
      key-store: ${HINATA_MONGO_TLS_KEYSTORE:}
      key-store-password: ${HINATA_MONGO_TLS_KEYSTORE_PASSWORD:}
      trust-store: ${HINATA_MONGO_TLS_TRUSTSTORE:}
      trust-store-password: ${HINATA_MONGO_TLS_TRUSTSTORE_PASSWORD:}
  app:
    min-version: ${HINATA_APP_MIN_VERSION:1.0.0}
    privacy-policy-url: ${HINATA_PRIVACY_POLICY_URL:}
    callback-scheme: ${HINATA_APP_CALLBACK_SCHEME:hinata}
    feature-flags:
      # Allows replying by e-mail to the sender of issues created via email-to-ticket.
      emailReply: ${HINATA_FEATURE_EMAIL_REPLY:true}
  mail:
    from: ${HINATA_MAIL_FROM:hinata@localhost}
  storage:
    endpoint: ${HINATA_S3_ENDPOINT:http://localhost:9000}
    access-key: ${HINATA_S3_ACCESS_KEY:}
    secret-key: ${HINATA_S3_SECRET_KEY:}
    bucket: ${HINATA_S3_BUCKET:hinata}
    region: ${HINATA_S3_REGION:us-east-1}
    max-upload-mb: ${HINATA_STORAGE_MAX_UPLOAD_MB:25}
  setup:
    auto-complete: ${HINATA_SETUP_AUTO_COMPLETE:false}
    organization-name: ${HINATA_SETUP_ORGANIZATION_NAME:}
    admin-email: ${HINATA_SETUP_ADMIN_EMAIL:}
    admin-username: ${HINATA_SETUP_ADMIN_USERNAME:}
    admin-password: ${HINATA_SETUP_ADMIN_PASSWORD:}
    admin-display-name: ${HINATA_SETUP_ADMIN_DISPLAY_NAME:}
  git-integration:
    github-client-id: ${HINATA_GIT_GITHUB_CLIENT_ID:}
    github-client-secret: ${HINATA_GIT_GITHUB_CLIENT_SECRET:}
    gitlab-client-id: ${HINATA_GIT_GITLAB_CLIENT_ID:}
    gitlab-client-secret: ${HINATA_GIT_GITLAB_CLIENT_SECRET:}
    bitbucket-client-id: ${HINATA_GIT_BITBUCKET_CLIENT_ID:}
    bitbucket-client-secret: ${HINATA_GIT_BITBUCKET_CLIENT_SECRET:}
    webhook-base-url: ${HINATA_GIT_WEBHOOK_BASE_URL:}
    token-secret: ${HINATA_GIT_TOKEN_SECRET:change-me-change-me-change-me-git-tokens}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${HINATA_DOCS_ENABLED:true}
  swagger-ui:
    enabled: false
  show-actuator: false
  default-produces-media-type: application/json
  packages-to-scan: com.ahmadre.hinata

scalar:
  enabled: ${HINATA_DOCS_ENABLED:true}
  path: /docs

logging:
  level:
    org.springframework.security: ${HINATA_LOG_SECURITY:WARN}
